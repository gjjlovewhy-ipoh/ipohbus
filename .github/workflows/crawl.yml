name: KL→Ipoh大巴定时爬虫
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
jobs:
  run_spider:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置Python3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行爬虫生成bus_data.js
        run: python spider.py

      - name: 提交更新文件
        run: |
          git config --global user.name "AutoSpiderBot"
          git config --global user.email "bot@spider@example.com"
          git add bus_data.js
          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "🤖 自动更新大巴数据: $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "数据未变更，跳过提交"
          fi
